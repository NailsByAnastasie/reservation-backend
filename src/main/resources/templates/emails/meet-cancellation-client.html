<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Annulation de rendez-vous</title>
</head>
<body style="background-color: #f7f7f7; padding: 40px 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333333; line-height: 1.6; margin: 0;">

<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px 40px; border-radius: 8px; border: 1px solid #eaeaea;">

    <div style="text-align: center; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; margin-bottom: 20px;">
        <h2 style="color: #ff4757; margin: 0; font-size: 24px; letter-spacing: 1px;">YONA NAILS</h2>
    </div>

    <p style="font-size: 16px;">Bonjour <b th:text="${clientName}">Prénom</b>,</p>

    <p style="font-size: 16px;">
        Nous vous confirmons l'annulation de votre rendez-vous du
        <b th:text="${meetDate}">01/01/2026</b> à <b th:text="${meetTime}">14:00</b>
        pour la prestation : <i th:text="${prestationName}">Prestation</i>.
    </p>

    <p style="font-size: 16px;">Nous espérons vous revoir très bientôt !</p>

    <p style="font-size: 16px; margin-bottom: 0; margin-top: 30px;">À très vite !<br><b>L'équipe Yona Nails</b></p>

</div>

<div style="text-align: center; margin-top: 20px; font-size: 12px; color: #999999;">
    <p>© 2026 Yona Nails - Aix-en-Provence</p>
</div>

</body>
</html>
