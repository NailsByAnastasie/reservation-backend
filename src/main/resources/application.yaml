spring:
  application:
    name: nails

  datasource:
    driver-class-name: org.postgresql.Driver

  output:
    ansi:
      enabled: ALWAYS

  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080

app:
  admin:
    default:
      email: ${DEFAULT_EMAIL}
      password: ${DEFAULT_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}